name: Build FIFA WC EAP

on:
  push:
    branches: [ main, master ]
    paths:
      - 'v1.0.0/**'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build EAP via Docker
        run: |
          docker build --tag fifa_wc:1.0.0 v1.0.0/

      - name: Extract EAP from image
        run: |
          id=$(docker create fifa_wc:1.0.0)
          docker cp "$id:/opt/app/." ./build/
          docker rm "$id"
          ls -lh build/*.eap

      - name: Upload EAP artifact
        uses: actions/upload-artifact@v4
        with:
          name: fifa_wc_1_0_0_aarch64
          path: build/*.eap
          retention-days: 30
